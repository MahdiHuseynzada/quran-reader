<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quran Reader</title>
    <link rel="manifest" href="manifest.json">
    <style>
    html {
        scroll-behavior: smooth;
    }

    body {
        margin: 0;
        font-family: system-ui;
        background: #121212;
        color: white;
    }

    header {
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1f1f1f;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
    }

    #surahList {
        padding: 10px;
    }

    .surahBtn {
        width: 100%;
        padding: 12px;
        margin: 6px 0;
        font-size: 16px;
        background: #1e1e1e;
        color: white;
        border-radius: 8px;
        border: none;
    }

    #reader {
        display: none;
        padding: 15px;
    }

    .translation {
        background: #1e1e1e;
        padding: 25px;
        margin: 20px auto;
        border-radius: 12px;
        font-size: 17px;
        line-height: 1.7;
        max-width: 900px;
        text-align: center;

    }

    #ayahHeader {
        font-size: 20px;
        margin-bottom: 10px;
    }

    input {
        width: 60px;
        font-size: 16px;
        text-align: center;
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

audio {
    width: 300px;
    margin: 10px auto 0;
    display: block;
}
    .light {
        background: white;
        color: black;
    }

    .light .translation {
        background: #f2f2f2;
    }
    </style>
</head>

<body>
    <header>
        <div>Quran Reader</div>
        <div>
            <button onclick="toggleMode()">☀️</button>
            <button onclick="toggleScroll()">Auto</button>
        </div>
    </header>
    <div style="padding:10px">
        <input id="search" placeholder="Search verse">
        <button onclick="searchVerse()">Search</button>
    </div>
    <div id="surahList"></div>
    <div id="reader">
        <div id="ayahHeader"></div>
        <div>
            <input id="ayahInput">
            <span id="total"></span>
        </div>
        <audio id="audio" controls></audio>
        <div class="translation" id="allText"></div>
        <div class="controls">
            <button onclick="prevAyah()">←</button>
            <button onclick="nextAyah()">→</button>
            <button onclick="bookmark()">⭐</button>
        </div>
    </div>
    <script>
    let currentSurah
    let currentAyah
    let totalAyahs
    let autoScroll = false

    const ayahInput = document.getElementById("ayahInput")

    async function loadSurahs() {

        const res = await fetch("https://api.alquran.cloud/v1/surah")
        const json = await res.json()

        json.data.forEach(surah => {

            const btn = document.createElement("button")

            btn.className = "surahBtn"

            btn.innerText = surah.number + " " + surah.englishName

            btn.onclick = () => {

                currentSurah = surah.number
                currentAyah = 1
                totalAyahs = surah.numberOfAyahs

                document.getElementById("surahList").style.display = "none"
                document.getElementById("reader").style.display = "block"

                let saved = localStorage.getItem("last_" + currentSurah)

                if (saved) {
                    currentAyah = parseInt(saved)
                }

                loadAyah()

            }

            document.getElementById("surahList").appendChild(btn)

        })

    }

    async function loadAyah() {

        const url =
            `https://api.alquran.cloud/v1/ayah/${currentSurah}:${currentAyah}/editions/en.sahih,az.mammadaliyev,tr.diyanet,tr.transliteration`

        const res = await fetch(url)

        const json = await res.json()

        const data = json.data

        const name = data[0].surah.englishNameTranslation

        document.getElementById("ayahHeader").innerText =
            `${currentSurah}. ${name} ${currentAyah}/${totalAyahs}`

        ayahInput.value = currentAyah

        document.getElementById("total").innerText = "/" + totalAyahs

        document.getElementById("allText").innerText =
            data[0].text +
            "\n\n-------------------------------\n\n" +
            data[1].text +
            "\n\n-------------------------------\n\n" +
            data[2].text +
            "\n\n-------------------------------\n\n" +
            data[3].text

        audio.src =
            `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${data[0].number}.mp3`

        localStorage.setItem("last_" + currentSurah, currentAyah)

    }

    ayahInput.onchange = () => {

        let v = parseInt(ayahInput.value)

        if (v >= 1 && v <= totalAyahs) {
            currentAyah = v
            loadAyah()
        }

    }

    function nextAyah() {

        if (currentAyah < totalAyahs) {

            currentAyah++

            loadAyah()

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            })

        }

    }

    function prevAyah() {

        if (currentAyah > 1) {

            currentAyah--

            loadAyah()

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            })

        }

    }

    function bookmark() {

        let list = JSON.parse(localStorage.getItem("bookmarks") || "[]")

        list.push(`${currentSurah}:${currentAyah}`)

        localStorage.setItem("bookmarks", JSON.stringify(list))

        alert("Bookmarked")

    }

    function toggleMode() {

        document.body.classList.toggle("light")

    }

    function toggleScroll() {

        autoScroll = !autoScroll

        if (autoScroll) {

            setInterval(() => {

                if (autoScroll) nextAyah()

            }, 4000)

        }

    }

    document.addEventListener("keydown", e => {

        const audio = document.getElementById("audio")

        if (e.key === "ArrowRight") {
            nextAyah()
        }

        if (e.key === "ArrowLeft") {
            prevAyah()
        }

        if (e.code === "Space") {

            e.preventDefault() // prevents page scroll

            if (audio.paused) {
                audio.play()
            } else {
                audio.pause()
            }

        }

    })

    let startX = 0

    document.addEventListener("touchstart", e => {

        startX = e.touches[0].clientX

    })

    document.addEventListener("touchend", e => {

        let endX = e.changedTouches[0].clientX

        if (startX - endX > 50) nextAyah()

        if (endX - startX > 50) prevAyah()

    })

    async function searchVerse() {

        let q = document.getElementById("search").value

        const res = await fetch(`https://api.alquran.cloud/v1/search/${q}/all/en`)

        const json = await res.json()

        alert("Found " + json.data.count + " verses")

    }

    loadSurahs()

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
    }
    </script>
</body>

</html>
